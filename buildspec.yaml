version: 0.2

phases:
  pre_build:
    commands:
      - echo "Getting AWS Account ID..."
      - ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $DEFAULT_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$DEFAULT_REGION.amazonaws.com
      - echo "Constructing image URI..."
      - IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME:$TAG

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $IMAGE_NAME:$TAG .
      - echo "Tagging Docker image..."
      - docker tag $IMAGE_NAME:$TAG $IMAGE_URI

  post_build:
    commands:
      - echo "Pushing Docker image to ECR..."
      - docker push $IMAGE_URI
      - echo "Build completed on $(date)"

artifacts:
  files:
    - '**/*'
  name: $IMAGE_NAME-$TAG